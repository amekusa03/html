    <!-- Lightbox -->
    <div class="photo-lightbox" id="photoLightbox">
        <button class="photo-lightbox-close" id="lightboxClose">&#x2715;</button>
        <button class="photo-lightbox-prev" id="lightboxPrev">&#x2039;</button>
        <img class="photo-lightbox-img" id="lightboxImg" src="" alt="">
        <button class="photo-lightbox-next" id="lightboxNext">&#x203A;</button>
    </div>

    <script>
        const lightbox = document.getElementById('photoLightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const items = Array.from(document.querySelectorAll('.photo-item img'));
        let current = 0;

        function open(index) {
            current = index;
            lightboxImg.src = items[current].src;
            lightboxImg.alt = items[current].alt;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function close() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        function prev() { open((current - 1 + items.length) % items.length); }
        function next() { open((current + 1) % items.length); }

        items.forEach((img, i) => img.parentElement.addEventListener('click', () => open(i)));
        document.getElementById('lightboxClose').addEventListener('click', close);
        document.getElementById('lightboxPrev').addEventListener('click', prev);
        document.getElementById('lightboxNext').addEventListener('click', next);
        lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') close();
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
        });
    </script>
