    const CATEGORY_ORDER = ["開発", "車", "音楽", "日常", "その他"];
    const allCategories = ["すべて", ...CATEGORY_ORDER.filter(cat => ESSAYS.some(e => e.categories.includes(cat)))];

    const mainEl = document.getElementById('archive-main');
    let currentCat = "すべて";

    function renderArchiveList() {
      document.title = "Notes Archive | 雨草の庭";

      const sorted = [...ESSAYS].sort((a, b) => b.slug.localeCompare(a.slug));
      const filtered = currentCat === "すべて" ? sorted : sorted.filter(e => e.categories.includes(currentCat));

      let html = `
        <div class="archive-header">
          <h2>Notes Archive</h2>
          <p class="archive-count">全 ${ESSAYS.length} 件</p>
        </div>
        <div class="category-filter" id="cat-filter">
      `;

      allCategories.forEach(cat => {
        const isActive = cat === currentCat ? ' active' : '';
        html += `<button class="cat-btn${isActive}" data-cat="${cat}">${cat}</button>`;
      });

      html += `</div><ul class="essay-list">`;

      if (filtered.length === 0) {
        html += `<li class="empty-msg">該当する記事がありません。</li>`;
      } else {
        filtered.forEach(essay => {
          const cats = essay.categories && essay.categories.length ? essay.categories : ['その他'];
          html += `
            <li class="essay-item" data-cat="${cats.join(' ')}">
              <span class="essay-date">${essay.date}
                ${cats.map(c => `<span class="essay-category-badge">${c}</span>`).join('')}
              </span>
              <a href="/#essay=${essay.slug}" class="essay-title">${essay.title}</a>
            </li>
          `;
        });
      }

      html += `</ul>`;
      mainEl.innerHTML = html;

      document.getElementById('cat-filter').addEventListener('click', e => {
        const btn = e.target.closest('.cat-btn');
        if (!btn) return;
        currentCat = btn.dataset.cat;
        renderArchiveList();
      });

      window.scrollTo(0, 0);
    }

    async function loadEssay(slug) {
      mainEl.innerHTML = '<div class="loading">読み込み中...</div>';

      try {
        const response = await fetch(`${slug}.md`);
        if (!response.ok) throw new Error('File not found');
        const markdownText = await response.text();
        const parsedHtml = marked.parse(markdownText);

        const essay = ESSAYS.find(e => e.slug === slug);
        if (essay) document.title = `${essay.title} | 雨草の庭`;

        mainEl.innerHTML = `
          <section class="essay-detail-section">
            <a href="#" class="back-btn" id="back-to-list">← 一覧に戻る</a>
            <div class="essay-content">${parsedHtml}</div>
          </section>
        `;

        document.getElementById('back-to-list').addEventListener('click', e => {
          e.preventDefault();
          history.replaceState(null, '', location.pathname);
          renderArchiveList();
        });

      } catch (error) {
        console.error(error);
        mainEl.innerHTML = `
          <div style="text-align:center;padding:3rem 0;">
            <p style="font-size:1.2rem;margin-bottom:1.5rem;">エッセイが見つかりませんでした。</p>
            <a href="#" class="back-btn" id="back-to-list" style="margin-bottom:0;">← 一覧に戻る</a>
          </div>
        `;
        document.getElementById('back-to-list').addEventListener('click', e => {
          e.preventDefault();
          history.replaceState(null, '', location.pathname);
          renderArchiveList();
        });
      }
      window.scrollTo(0, 0);
    }

    function router() {
      const hash = window.location.hash;
      if (hash.startsWith('#essay=')) {
        loadEssay(hash.replace('#essay=', ''));
      } else {
        renderArchiveList();
      }
    }

    window.addEventListener('hashchange', router);
    window.addEventListener('DOMContentLoaded', router);
  </script>
</body>

</html>
