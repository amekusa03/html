<div style="position: relative; width: 100%; height: 340px;">
  <canvas id="chart1" role="img" aria-label="5つの商品カテゴリにおけるAmazon、Yahoo、楽天の評価値の比較棒グラフ">ヒューズ電源: Amazon343 Yahoo270
    楽天424/ギボシ: 739,689,708/バッフル: 1152,1000,1147/スピーカー: 6217,751,5754/レジェトレックス: 5441,14563,2984</canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin: 8px 0 0; font-size: 12px; color: var(--text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span
      style="width: 10px; height: 10px; border-radius: 2px; background: #2a78d6;"></span>Amazon</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span
      style="width: 10px; height: 10px; border-radius: 2px; background: #1baf7a;"></span>Yahoo</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span width: 10px; height: 10px; border-radius: 2px;
      background: #eda100;"></span>楽天</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span
      style="width: 14px; height: 2px; background: #4a3aa7;"></span>平均</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const labels = ['商品A', '商品B', '商品C', '商品D', '商品E'];
  const amazon = [343, 739, 1152, 6217, 5441];
  const yahoo = [270, 689, 1000, 751, 14563];
  const rakuten = [424, 708, 1147, 5754, 2984];
  const avg = [346, 712, 1100, 4241, 7663];

  new Chart(document.getElementById('chart1'), {
    data: {
      labels: labels,
      datasets: [
        { type: 'bar', label: 'Amazon', data: amazon, backgroundColor: '#2a78d6', borderRadius: 4 },
        { type: 'bar', label: 'Yahooオークション・フリマ', data: yahoo, backgroundColor: '#1baf7a', borderRadius: 4 },
        { type: 'bar', label: '楽天市場', data: rakuten, backgroundColor: '#eda100', borderRadius: 4 },
        { type: 'line', label: '平均', data: avg, borderColor: '#4a3aa7', backgroundColor: '#4a3aa7', borderWidth: 2, pointRadius: 4, pointBackgroundColor: '#4a3aa7', tension: 0.2 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, grid: { color: '#e1e0d9' }, ticks: { color: '#898781' } },
        x: { grid: { display: false }, ticks: { color: '#898781', maxRotation: 30 } }
      }
    }
  });
</script>
