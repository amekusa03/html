    // カテゴリの表示順序
    const CATEGORY_ORDER = ["開発", "車", "日常", "その他"];

    const contentArea = document.getElementById('notes');

    // 画面ルーティング処理
    function router() {
      const hash = window.location.hash;

      if (hash.startsWith('#essay=')) {
        const slug = hash.replace('#essay=', '');
        const essay = ESSAYS.find(e => e.slug === slug);
        if (essay) {
          loadEssay(slug);
          toggleHomeSections(false);
        } else {
          render404();
          toggleHomeSections(false);
        }
      } else {
        renderEssayList();
        toggleHomeSections(true);
      }
      updateActiveNav();
    }

    // トップページのセクション表示切り替え
    function toggleHomeSections(show) {
      const displayValue = show ? 'block' : 'none';
      const sections = ['photography', 'profile', 'links'];
      sections.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.display = displayValue;
        }
      });
    }

    // エッセイ一覧の描画（最新20件、日付降順）
    const RECENT_COUNT = 20;

    function renderEssayList() {
      // トップに戻ったらタイトルをリセット
      document.title = "雨草の庭 | Notes";

      // 日付降順にソートして最新20件を取得
      const sorted = [...ESSAYS].sort((a, b) => b.slug.localeCompare(a.slug));
      const recent = sorted.slice(0, RECENT_COUNT);
      const hasMore = sorted.length > RECENT_COUNT;

      let html = `
        <section class="essay-list-section">
          <h2>Notes</h2>
          <ul class="essay-list">
      `;

      recent.forEach(essay => {
        html += `
          <li class="essay-item">
            <span class="essay-date">${essay.date}
              <span class="essay-category-badge">${essay.category || 'その他'}</span>
            </span>
            <a href="#essay=${essay.slug}" class="essay-title">${essay.title}</a>
          </li>
        `;
      });

      html += `</ul>`;

      if (hasMore) {
        html += `
          <div class="archive-link-wrap">
            <a href="essays/" class="archive-link">過去の記事をもっと見る →</a>
          </div>
        `;
      }

      html += `</section>`;

      contentArea.innerHTML = html;
      window.scrollTo(0, 0);
    }

    // エッセイ詳細のロードと描画
    async function loadEssay(slug) {
      contentArea.innerHTML = '<div class="loading">読み込み中...</div>';

      try {
        const response = await fetch(`essays/${slug}.md`);
        if (!response.ok) {
          throw new Error('File not found');
        }
        const markdownText = await response.text();

        // marked.js を使ってパース
        const parsedHtml = marked.parse(markdownText);

        const essay = ESSAYS.find(e => e.slug === slug);
        if (essay) {
          document.title = `${essay.title} | 雨草の庭`;
        }

        contentArea.innerHTML = `
          <section class="essay-detail-section">
            <a href="#notes" class="back-btn">← 一覧に戻る</a>
            <div class="essay-content">
              ${parsedHtml}
            </div>
          </section>
        `;
      } catch (error) {
        console.error(error);
        render404();
      }
      window.scrollTo(0, 0);
    }

    // エラー時の描画
    function render404() {
      contentArea.innerHTML = `
        <div style="text-align: center; padding: 3rem 0;">
          <p style="font-size: 1.2rem; margin-bottom: 1.5rem;">エッセイが見つかりませんでした。</p>
          <a href="#notes" class="back-btn" style="margin-bottom: 0;">← 一覧に戻る</a>
        </div>
      `;
    }

    // ナビゲーションのアクティブ状態更新
    function updateActiveNav() {
      const hash = window.location.hash;
      const navItems = document.querySelectorAll('.nav-item');
      navItems.forEach(item => item.classList.remove('active'));

      if (hash.startsWith('#essay=')) {
        const notesNav = document.querySelector('.nav-item[href="#notes"]');
        if (notesNav) notesNav.classList.add('active');
      } else {
        const activeNav = document.querySelector(`.nav-item[href="${hash || '#notes'}"]`);
        if (activeNav) {
          activeNav.classList.add('active');
        } else {
          const notesNav = document.querySelector('.nav-item[href="#notes"]');
          if (notesNav) notesNav.classList.add('active');
        }
      }
    }

    // スクロールスパイ（Intersection Observer）の設定
    let observer;
    function initScrollSpy() {
      const observerOptions = {
        root: null,
        rootMargin: '-30% 0px -50% 0px',
        threshold: 0
      };

      observer = new IntersectionObserver((entries) => {
        // エッセイ詳細表示時はスクロールスパイを無効化
        if (window.location.hash.startsWith('#essay=')) return;

        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));

            let targetHref = `#${id}`;
            const activeNav = document.querySelector(`.nav-item[href="${targetHref}"]`);
            if (activeNav) activeNav.classList.add('active');
          }
        });
      }, observerOptions);

      const targets = [
        document.getElementById('notes'),
        document.getElementById('photography'),
        document.getElementById('profile'),
        document.getElementById('links')
      ];
      targets.forEach(t => {
        if (t) observer.observe(t);
      });
    }

    // 訪問者数の取得と更新
    async function updateVisitorCounter() {
      const countEl = document.getElementById('visitor-count');
      if (!countEl) return;

      const namespace = 'amekusa_portfolio';
      const key = 'visitors';
      const sessionKey = 'visited_amekusa';

      let url = `https://api.counterapi.dev/v1/${namespace}/${key}/`;
      const isNewSession = !sessionStorage.getItem(sessionKey);

      if (isNewSession) {
        url += 'up';
        sessionStorage.setItem(sessionKey, 'true');
      }

      try {
        const response = await fetch(url);
        if (response.ok) {
          const data = await response.json();
          if (data && typeof data.count === 'number') {
            countEl.textContent = data.count.toLocaleString();
          } else {
            countEl.textContent = '—';
          }
        } else {
          countEl.textContent = '—';
        }
      } catch (error) {
        console.error('Failed to fetch visitor count:', error);
        countEl.textContent = '—';
      }
    }

    // ハッシュ変更と初回読み込み時の監視
    window.addEventListener('hashchange', router);
    window.addEventListener('DOMContentLoaded', () => {
      router();
      initScrollSpy();
      updateVisitorCounter();
    });
  </script>
