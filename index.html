  <!-- Markdown Parser (marked.js) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg-color: #f5f0e8;
      --text-color: #1c1a17;
      --accent-green: #3a5a2e;
      --accent-hover: #4e753f;
      --card-bg: rgba(255, 255, 255, 0.55);
      --font-serif: 'Noto Serif JP', "Hiragino Mincho ProN", "Yu Mincho", serif;
      --font-sans: 'Noto Sans JP', "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      --washi-line: rgba(58, 90, 46, 0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #18160f;
        --text-color: #e8e2d8;
        --card-bg: rgba(38, 34, 26, 0.65);
        --washi-line: rgba(160, 180, 140, 0.04);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: var(--font-sans);
      line-height: 1.9;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--washi-line) 39px, var(--washi-line) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--washi-line) 39px, var(--washi-line) 40px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 750px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 3.5rem 3rem;
      box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
      animation: fadeIn 0.8s ease-out;
    }

    @media (max-width: 600px) {
      body {
        padding: 1.5rem 1rem;
      }
      .container {
        padding: 2rem 1.5rem;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }

    .hero-gif {
      width: 70px;
      margin-bottom: 1.5rem;
      mask-image: radial-gradient(circle, black 40%, rgba(0, 0, 0, 0) 100%);
      -webkit-mask-image: radial-gradient(circle, black 40%, rgba(0, 0, 0, 0) 100%);
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      letter-spacing: 0.25em;
      font-weight: 300;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      color: var(--accent-green);
      opacity: 0.8;
    }

    /* エッセイリスト表示 */
    .essay-list-section h2 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(58, 90, 46, 0.15);
      letter-spacing: 0.1em;
    }

    .essay-list {
      list-style: none;
    }

    .essay-item {
      margin-bottom: 2rem;
      position: relative;
      transition: transform 0.2s;
    }

    .essay-item:hover {
      transform: translateX(4px);
    }

    .essay-date {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 0.2rem;
      display: block;
      letter-spacing: 0.05em;
    }

    .essay-title {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-color);
      text-decoration: none;
      transition: color 0.2s;
      line-height: 1.5;
    }

    .essay-title:hover {
      color: var(--accent-green);
    }

    /* エッセイ詳細表示 */
    .essay-detail-section {
      animation: fadeIn 0.5s ease-out;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--accent-green);
      font-size: 0.9rem;
      margin-bottom: 2.5rem;
      transition: color 0.2s, transform 0.2s;
    }

    .back-btn:hover {
      color: var(--accent-hover);
      transform: translateX(-4px);
    }

    /* Markdownレンダリング用スタイル */
    .essay-content {
      font-size: 1.05rem;
      line-height: 2.1;
      font-weight: 300;
    }

    .essay-content h1 {
      font-family: var(--font-serif);
      font-size: 1.9rem;
      font-weight: 400;
      margin-bottom: 0.8rem;
      text-align: left;
      line-height: 1.4;
      letter-spacing: 0.05em;
    }

    /* テンプレートの "YYYY.MM.DD ・ プロジェクト名" 記述用 */
    .essay-content h1 + p {
      font-size: 0.9rem;
      opacity: 0.65;
      margin-bottom: 3.5rem;
      letter-spacing: 0.05em;
    }

    .essay-content h2 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 400;
      margin-top: 3.5rem;
      margin-bottom: 1.2rem;
      color: var(--accent-green);
      border-left: 2px solid var(--accent-green);
      padding-left: 0.8rem;
      letter-spacing: 0.05em;
    }

    .essay-content p {
      margin-bottom: 1.8rem;
      text-align: justify;
    }

    .essay-content hr {
      border: none;
      border-top: 1px solid rgba(58, 90, 46, 0.15);
      margin: 3.5rem 0 2rem 0;
    }

    /* ソースコードのリンク（脚注的扱い） */
    .essay-content hr + p {
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .essay-content a {
      color: var(--accent-green);
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s;
    }

    .essay-content a:hover {
      color: var(--accent-hover);
    }

    /* ローディング表示 */
    .loading {
      text-align: center;
      padding: 3rem 0;
      font-size: 1rem;
      opacity: 0.7;
      letter-spacing: 0.1em;
    }

    #rain-canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
      pointer-events: none;
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.5;
    }

    .archive-link {
      display: inline-block;
      margin-top: 1rem;
      color: var(--text-color);
      text-decoration: none;
      border-bottom: 1px dashed var(--text-color);
      font-size: 0.85rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .archive-link:hover {
      opacity: 1;
    }
  </style>

<body>
  <canvas id="rain-canvas"></canvas>

  <div class="container">
    <header>
      <a href="#"><img src="amenoniwa.png" alt="Character animation" class="hero-gif"></a>
      <h1>雨草の庭</h1>
      <p class="subtitle">Engineering & Nature Portfolio</p>
    </header>

    <main id="app-content">
      <!-- ここに動的に一覧または詳細が読み込まれます -->
    </main>

    <footer>
      <p>Copyright &copy; amekusa All Rights Reserved.</p>
      <p><a href="index_archive.html" class="archive-link">旧サイト（カード型カタログ）はこちら</a></p>
    </footer>
  </div>

  <script defer src="rain.js"></script>
  <script>
    // =====================================================================
    // エッセイデータ定義
    // 新しいエッセイを追加した場合は、以下に日付とファイル名のスラッグを追記する
    // =====================================================================
    const ESSAYS = [
      {
        slug: "2026-06-20-portfolio-redesign",
        date: "2026.06.20",
        title: "ポートフォリオの再設計"
      }
    ];

    const contentArea = document.getElementById('app-content');

    // 画面ルーティング処理
    function router() {
      const hash = window.location.hash;

      if (hash.startsWith('#essay=')) {
        const slug = hash.replace('#essay=', '');
        const essay = ESSAYS.find(e => e.slug === slug);
        if (essay) {
          loadEssay(slug);
        } else {
          render404();
        }
      } else {
        renderEssayList();
      }
    }

    // エッセイ一覧の描画
    function renderEssayList() {
      // トップに戻ったらタイトルをリセット
      document.title = "雨草の庭 | Essay Portfolio";

      let html = `
        <section class="essay-list-section">
          <h2>記録</h2>
          <ul class="essay-list">
      `;

      ESSAYS.forEach(essay => {
        html += `
          <li class="essay-item">
            <span class="essay-date">${essay.date}</span>
            <a href="#essay=${essay.slug}" class="essay-title">${essay.title}</a>
          </li>
        `;
      });

      html += `
          </ul>
        </section>
      `;

      contentArea.innerHTML = html;
      window.scrollTo(0, 0);
    }

    // エッセイ詳細のロードと描画
    async function loadEssay(slug) {
      contentArea.innerHTML = '<div class="loading">読み込み中...</div>';

      try {
        const response = await fetch(`essays/${slug}.md`);
        if (!response.ok) {
          throw new Error('File not found');
        }
        const markdownText = await response.text();

        // marked.js を使ってパース
        const parsedHtml = marked.parse(markdownText);

        const essay = ESSAYS.find(e => e.slug === slug);
        if (essay) {
          document.title = `${essay.title} | 雨草の庭`;
        }

        contentArea.innerHTML = `
          <section class="essay-detail-section">
            <a href="#" class="back-btn">← 一覧に戻る</a>
            <div class="essay-content">
              ${parsedHtml}
            </div>
          </section>
        `;
      } catch (error) {
        console.error(error);
        render404();
      }
      window.scrollTo(0, 0);
    }

    // エラー時の描画
    function render404() {
      contentArea.innerHTML = `
        <div style="text-align: center; padding: 3rem 0;">
          <p style="font-size: 1.2rem; margin-bottom: 1.5rem;">エッセイが見つかりませんでした。</p>
          <a href="#" class="back-btn" style="margin-bottom: 0;">← 一覧に戻る</a>
        </div>
      `;
    }

    // ハッシュ変更と初回読み込み時の監視
    window.addEventListener('hashchange', router);
    window.addEventListener('DOMContentLoaded', router);
  </script>
</body>
